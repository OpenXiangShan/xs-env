# XiangShan Conda Environment Specification
# This file defines all dependencies needed to build and simulate XiangShan processor.
# Use conda-lock to generate an exact lock file for reproducible environments.

name: xs-env

channels:
  - conda-forge
  - ucb-bar

dependencies:
  # Core compiler toolchain
  - gcc >=13.2,<14
  - gxx >=13.2,<14
  - binutils

  # Simulation and verification tools
  - verilator >=5.022,<6

  # RISC-V toolchain (from ucb-bar channel)
  - riscv-tools >=1.0.6

  # Java and Scala build tools (for Chisel)
  - openjdk >=20,<21
  - sbt

  # System libraries
  - zlib
  - ncurses
  - make
  - cmake
  - flex
  - bison

  # Python dependencies (for various scripts)
  - python >=3.10,<4
  - pyyaml