# XiangShan Conda Environment - Extended
# 参考 Chipyard chipyard-extended.yaml

channels:
    - conda-forge
    - ucb-bar
    - litex-hub
    - nodefaults

platforms:
    - linux-64

dependencies:
    # ============================================
    # Mill 构建系统
    # ============================================
    - mill

    # ============================================
    # FIRRTL/Chisel 工具
    # ============================================
    - firtool

    # ============================================
    # Clang/LLVM (用于 Verilator 编译)
    # ============================================
    - clang=18
    - clang-tools=18
    - llvm=18

    # ============================================
    # 额外系统工具
    # ============================================
    - vim
    - graphviz
    - gmp
    - mpfr
    - mpc

    # ============================================
    # Python (用于 Chisel 测试等)
    # ============================================
    - python>=3.10
    - numpy

    # ============================================
    # 仿真验证工具
    # ============================================
    - screen
    - rsync