version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "feat(nix)"
    groups:
      nix-upstream:
        exclude-patterns:
          - "gsim"
      nix-gsim:
        patterns:
          - "gsim"
